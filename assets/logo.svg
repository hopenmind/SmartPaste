  <!-- Clipboard Clip -->
  <path d="M100 50 h56 a8 8 0 0 1 8 8 v16 a8 8 0 0 1 -8 8 h-56 a8 8 0 0 1 -8 -8 v-16 a8 8 0 0 1 8 -8 z" fill="#94A3B8" />
  <rect x="116" y="40" width="24" height="16" rx="6" fill="#CBD5E1" />

  <!-- Text lines on clipboard -->
  <rect x="90" y="110" width="76" height="8" rx="4" fill="#E2E8F0" />
  <rect x="90" y="134" width="76" height="8" rx="4" fill="#E2E8F0" />
  <rect x="90" y="158" width="50" height="8" rx="4" fill="#E2E8F0" />

  <!-- Magic Sparkles -->
